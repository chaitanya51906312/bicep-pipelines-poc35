# ============================================================================
# Azure Pipeline — deploy Azure infrastructure (App Service + Storage) with Bicep.
# Runtime parameter ACTION lets you deploy or tear down using the same pipeline.
# ============================================================================

# Manual runtime parameter shown when you click "Run pipeline".
parameters:
  - name: action
    displayName: "Action to perform"
    type: string
    default: deploy
    values:
      - deploy
      - destroy

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/**
      - pipelines/**

variables:
  azureServiceConnection: "azure-arm-connection" # ARM service connection name
  resourceGroup: "demo-rg"
  location: "eastus"
  templateFile: "bicep/main.bicep"
  paramFile: "bicep/main.dev.bicepparam"

pool:
  vmImage: "ubuntu-latest"

stages:
  # -------------------- VALIDATE --------------------
  - stage: Validate
    displayName: "Validate Bicep"
    condition: eq('${{ parameters.action }}', 'deploy')
    jobs:
      - job: LintAndWhatIf
        steps:
          - task: AzureCLI@2
            displayName: "Bicep build (lint) + what-if"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                az bicep build --file $(templateFile)
                az group create --name $(resourceGroup) --location $(location)
                az deployment group what-if \
                  --resource-group $(resourceGroup) \
                  --template-file $(templateFile) \
                  --parameters $(paramFile)

  # -------------------- DEPLOY --------------------
  - stage: Deploy
    displayName: "Deploy Bicep"
    dependsOn: Validate
    condition: and(succeeded(), eq('${{ parameters.action }}', 'deploy'))
    jobs:
      - deployment: DeployInfra
        environment: "bicep-poc"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: AzureCLI@2
                  displayName: "az deployment group create"
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e
                      az deployment group create \
                        --resource-group $(resourceGroup) \
                        --template-file $(templateFile) \
                        --parameters $(paramFile) \
                        --query "properties.outputs" -o json

  # -------------------- DESTROY --------------------
  - stage: Destroy
    displayName: "Destroy resources"
    condition: eq('${{ parameters.action }}', 'destroy')
    jobs:
      - deployment: DestroyInfra
        environment: "bicep-poc-destroy"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: "Delete resource group"
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e
                      az group delete --name $(resourceGroup) --yes --no-wait
